name: Automatic Release with Zip

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build and Cache File]
    types:
      - completed

jobs:        
  release:
    name: Automatic Release
    runs-on: self-hosted
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
  
      - name: Download ZIP file
        uses: actions/download-artifact@v2
        with:
          name: VALocker-zip
          path: artifacts/
  
      - uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          files: |
            artifacts/VALocker.zip
          
