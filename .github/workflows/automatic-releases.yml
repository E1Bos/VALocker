name: "Automatic Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: "Automatic Release"
    runs-on: "windows-latest"
    steps:
      - uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false